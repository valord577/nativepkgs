name: sqlite3
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/sqlite3.yml'
      - 'patches/sqlite3/**'
      - 'modules/sqlite3.py'
  pull_request:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/sqlite3.yml'
      - 'patches/sqlite3/**'
      - 'modules/sqlite3.py'

jobs:
  build:
    # if: ${{ false }}
    secrets: inherit
    uses: ./.github/workflows/_matrix.yml
    with:
      disable_static: true
      select_platforms: "macosx, linux, android"
