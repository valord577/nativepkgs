name: zlib-ng
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/zlib-ng.yml'
      - 'patches/zlib-ng/**'
      - 'modules/zlib-ng.py'
      - 'build_v2.py'
  pull_request:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/zlib-ng.yml'
      - 'patches/zlib-ng/**'
      - 'modules/zlib-ng.py'
      - 'build_v2.py'

jobs:
  build:
    # if: ${{ false }}
    secrets: inherit
    uses: ./.github/workflows/_matrix.yml
    with:
      enable_static_commit: true
      skip_platform_apple: true
