name: _matrix
on:
  workflow_call:
    inputs:
      disable_shared:
        default: false
        required: false
        type: boolean
      enable_shared_commit:
        default: false
        required: false
        type: boolean
      disable_static:
        default: false
        required: false
        type: boolean
      enable_static_commit:
        default: false
        required: false
        type: boolean

      allow_failure:
        default: true
        required: false
        type: boolean

      container:
        default: "crossbuild-all-in-one"
        required: false
        type: string
      container_vers:
        default: "20260709T161253Z-f8d59b5"
        required: false
        type: string

      skip_platform_apple:
        default: false
        required: false
        type: boolean
      skip_platform_win32:
        default: false
        required: false
        type: boolean
      skip_platform_linux:
        default: false
        required: false
        type: boolean
      skip_platform_android:
        default: false
        required: false
        type: boolean
      select_platforms:
        default: ""
        required: false
        type: string


env:
  GH_TOKEN: ${{ github.token }}
  PKG_NAME: ${{ github.workflow }}
  SCCACHE_GHA_ENABLED: "true"
  CI_HIT_MESSAGE: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} (${{ github.sha }})"
  S3_R2_ACCOUNT_ID: ${{ secrets.S3_R2_ACCOUNT_ID }}
  S3_R2_ACCESS_KEY: ${{ secrets.S3_R2_ACCESS_KEY }}
  S3_R2_SECRET_KEY: ${{ secrets.S3_R2_SECRET_KEY }}
  S3_R2_STORAGE_BUCKET: ${{ secrets.S3_R2_STORAGE_BUCKET }}
  S3_R2_STORAGE_REGION: ${{ secrets.S3_R2_STORAGE_REGION }}

jobs:
  _preset:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      matrix-container: ${{ steps.set-matrix-container.outputs.matrix-container }}
    steps:
      - name: clone source
        run: |
          git config --global --add safe.directory "*"

          git init
          git remote add x ${{github.server_url}}/${{ github.repository }}.git
          git fetch --no-tags --prune --no-recurse-submodules --depth=1 x +${{ github.sha }}
          git checkout FETCH_HEAD
      - name: jq filters
        run: |
          _platforms_="${{ inputs.select_platforms }}"; _platforms_triplet_=(${_platforms_//,/ })
          for _platform_ in ${_platforms_triplet_[@]}; do
            if [ -z "${jq_expr_plat}" ];
              then { jq_expr_plat="(.platform==\"${_platform_}\")"; }
              else { jq_expr_plat="$jq_expr_plat or (.platform==\"${_platform_}\")"; }
            fi
          done
          printf "\e[1m\e[33m%s\e[0m\n" "jq_expr_plat: $jq_expr_plat"; echo "jq_expr_plat=$jq_expr_plat" >> "$GITHUB_ENV"
      - name: set matrix
        id: set-matrix
        run: |
          _is_apple_='.platform == "iphoneos" or .platform == "iphonesimulator" or .platform == "macosx"'
          _is_win32_='.platform == "win-msvc"'

          matrix=$(cat .github/matrix.json | jq -c -M)
          matrix=$(echo ${matrix} | jq -c -M "map(if ${_is_apple_} then . + {os: \"macos-15\"} else . end)")
          matrix=$(echo ${matrix} | jq -c -M "map(if ${_is_win32_} then . + {os: \"windows-2022\"} else . end)")

          [ -n "${jq_expr_plat}" ] && \
            { matrix=$(echo ${matrix} | jq -c -M "map(. | select($jq_expr_plat) )"); }

          ${{ inputs.skip_platform_apple }} && \
            { matrix=$(echo ${matrix} | jq -c -M "map(if ${_is_apple_} then empty else . end)"); }
          ${{ inputs.skip_platform_win32 }} && \
            { matrix=$(echo ${matrix} | jq -c -M "map(if ${_is_win32_} then empty else . end)"); }


          matrix_shared='[]'; matrix_static='[]'
          ${{ (! inputs.disable_shared) }} && \
            { matrix_shared=$(echo ${matrix} | jq -c -M 'map(. + {"pkg_type": "shared"})'); }
          ${{ (! inputs.disable_static) }} && \
            { matrix_static=$(echo ${matrix} | jq -c -M 'map(. + {"pkg_type": "static"})'); }
          matrix=$(echo ${matrix_shared} | jq -c -M --argjson matrix_static "${matrix_static}" '. + $matrix_static')

          printf "\e[1m\e[33m%s\e[0m\n" "matrix: $matrix"
          echo "matrix={\"include\":$(echo $matrix)}" >> "$GITHUB_OUTPUT"
      - name: set matrix container
        id: set-matrix-container
        run: |
          container_all_in_one="valord577/${{ inputs.container }}:${{ inputs.container_vers }}"

          matrix=$(cat .github/matrix_container.json | jq -c -M)
          matrix=$(echo ${matrix} | jq -c -M "map(if .platform == \"linux\"     then . + {image: \"${container_all_in_one}\"} else . end)")
          matrix=$(echo ${matrix} | jq -c -M "map(if .platform == \"win-mingw\" then . + {image: \"${container_all_in_one}\"} else . end)")
          matrix=$(echo ${matrix} | jq -c -M "map(if .platform == \"android\"   then . + {image: \"${container_all_in_one}\"} else . end)")

          [ -n "${jq_expr_plat}" ] && \
            { matrix=$(echo ${matrix} | jq -c -M "map(. | select($jq_expr_plat) )"); }

          ${{ inputs.skip_platform_linux }} && \
            { matrix=$(echo ${matrix} | jq -c -M 'map(if .platform == "linux"     then empty else . end)'); }
          ${{ inputs.skip_platform_win32 }} && \
            { matrix=$(echo ${matrix} | jq -c -M 'map(if .platform == "win-mingw" then empty else . end)'); }
          ${{ inputs.skip_platform_android }} && \
            { matrix=$(echo ${matrix} | jq -c -M 'map(if .platform == "android"   then empty else . end)'); }


          matrix_shared='[]'; matrix_static='[]'
          ${{ (! inputs.disable_shared) }} && \
            { matrix_shared=$(echo ${matrix} | jq -c -M 'map(. + {"pkg_type": "shared"})'); }
          ${{ (! inputs.disable_static) }} && \
            { matrix_static=$(echo ${matrix} | jq -c -M 'map(. + {"pkg_type": "static"})'); }
          matrix=$(echo ${matrix_shared} | jq -c -M --argjson matrix_static "${matrix_static}" '. + $matrix_static')

          printf "\e[1m\e[33m%s\e[0m\n" "matrix: $matrix"
          echo "matrix-container={\"include\":$(echo $matrix)}" >> "$GITHUB_OUTPUT"

  _buildx_on_host:
    needs: _preset
    strategy:
      matrix: ${{ fromJson(needs._preset.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ inputs.allow_failure }}
    defaults:
      run:
        shell: ${{ startsWith(matrix.os, 'windows') && 'pwsh' || 'bash' }}
    env:
      PKG_TYPE: ${{ matrix.pkg_type }}
    steps:
      - name: set sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: set required something(s) ~ macos
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          sudo mdutil -a -i off

          brew install nasm

          brew list -l

          echo "INST_DIR=${GITHUB_WORKSPACE}/out/${{ env.PKG_NAME }}" >> "${GITHUB_ENV}"
      - name: set required something(s) ~ windows
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          Set-MpPreference `
            -DisableBehaviorMonitoring $True `
            -DisableIOAVProtection     $True `
            -DisableArchiveScanning    $True `
            -DisableScriptScanning     $True `
            -DisableRealtimeMonitoring $True
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Force -Scope CurrentUser

          choco install nasm

          choco list

          C:/msys64/usr/bin/bash.exe -lc `
            'pacman --noconfirm -S zip unzip;'

          echo "INST_DIR=${env:GITHUB_WORKSPACE}/out/${{ env.PKG_NAME }}" >> "${env:GITHUB_ENV}"
      - name: clone source
        run: |
          git config --global --add safe.directory "*"

          git init
          git remote add x ${{github.server_url}}/${{ github.repository }}.git
          git fetch --no-tags --prune --no-recurse-submodules --depth=1 x +${{ github.sha }}
          git checkout FETCH_HEAD
      - name: library buildx - [${{ env.PKG_NAME }} @${{ env.PKG_TYPE }}]
        run: |
          python3 -m venv .env
          ${{
            startsWith(matrix.os, 'windows')
              && '.env/Scripts/activate.ps1'
              || '. .env/bin/activate'
          }}
          python3 ./build_v2.py ${{ env.PKG_NAME }} ${{ matrix.platform }} ${{ matrix.arch }}
      - name: library packed ~ macos
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          # keep file permissions and case sensitivity
          cd ${{ env.INST_DIR }}/..; zip -ry ${GITHUB_WORKSPACE}/${{ env.PKG_ZIPNAME }}.zip $(basename ${{ env.INST_DIR }})
      - name: library packed ~ windows
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          # keep file permissions and case sensitivity
          $shell = @'
            inst_dir=$(cygpath -u "${{ env.INST_DIR }}")
            zip_file=$(cygpath -u "${GITHUB_WORKSPACE}/${{ env.PKG_ZIPNAME }}.zip")
            cd ${inst_dir}/..; zip -ry "${zip_file}" "$(basename ${inst_dir})"
          '@
          C:/msys64/usr/bin/bash.exe -lc "${shell}"
      - name: library upload
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.PKG_ZIPNAME }}.zip
          archive: false
      - name: commit to pre-compiled storage
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            (
              (matrix.pkg_type == 'static' && inputs.enable_static_commit) ||
              (matrix.pkg_type == 'shared' && inputs.enable_shared_commit)
            )
          }}
        run: |
          ./.github/rclone copy "${{ env.PKG_ZIPNAME }}.zip" "r2:${{ env.S3_R2_STORAGE_BUCKET }}/packages/${{ env.PKG_NAME }}/${{ env.PKG_VERSION }}/"

  _buildx_on_container:
    needs: _preset
    strategy:
      matrix: ${{ fromJson(needs._preset.outputs.matrix-container) }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.allow_failure }}
    container:
      image: ${{ matrix.image }}
    defaults:
      run:
        shell: bash
    env:
      PKG_TYPE: ${{ matrix.pkg_type }}
    steps:
      - name: set sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: clone source
        run: |
          git config --global --add safe.directory "*"

          git init
          git remote add x ${{github.server_url}}/${{ github.repository }}.git
          git fetch --no-tags --prune --no-recurse-submodules --depth=1 x +${{ github.sha }}
          git checkout FETCH_HEAD
      - name: set runtime env
        run: |
          echo "INST_DIR=${GITHUB_WORKSPACE}/out/${{ env.PKG_NAME }}" >> "${GITHUB_ENV}"
      - name: library buildx - [${{ env.PKG_NAME }} @${{ env.PKG_TYPE }}]
        run: |
          build_target_args='${{ matrix.platform }} ${{ matrix.arch }}'
          ${{ matrix.platform == 'linux' }}   && \
            {
              build_target_args='${{ matrix.platform }} crossbuild ${{ matrix.arch }} ${{ matrix.info }}'
            }
          ${{ matrix.platform == 'android' }} && \
            {
              build_target_args='${{ matrix.platform }} ${{ matrix.arch }} ${{ matrix.info }}'
            }

          python3 -m venv .env; . .env/bin/activate
          ./build_v2.py ${{ env.PKG_NAME }} ${build_target_args}
      - name: library packed
        run: |
          # keep file permissions and case sensitivity
          cd ${{ env.INST_DIR }}/..; zip -ry ${GITHUB_WORKSPACE}/${{ env.PKG_ZIPNAME }}.zip $(basename ${{ env.INST_DIR }})
      - name: library upload
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.PKG_ZIPNAME }}.zip
          archive: false
      - name: commit to pre-compiled storage
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            (
              (matrix.pkg_type == 'static' && inputs.enable_static_commit) ||
              (matrix.pkg_type == 'shared' && inputs.enable_shared_commit)
            )
          }}
        run: |
          ./.github/rclone copy "${{ env.PKG_ZIPNAME }}.zip" "r2:${{ env.S3_R2_STORAGE_BUCKET }}/packages/${{ env.PKG_NAME }}/${{ env.PKG_VERSION }}/"
