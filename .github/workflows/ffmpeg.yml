name: ffmpeg
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/ffmpeg.yml'
      - 'patches/ffmpeg/**'
      - 'modules/ffmpeg.py'

jobs:
  build:
    # if: ${{ false }}
    secrets: inherit
    uses: ./.github/workflows/_matrix.yml
    with:
      disable_static: true
      select_platforms: "macosx, linux, win-mingw, android"
