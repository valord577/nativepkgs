name: llvm
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/llvm.yml'
      - 'patches/llvm/**'
      - 'modules/llvm.py'
      - 'build_v2.py'

jobs:
  build:
    # if: ${{ false }}
    secrets: inherit
    uses: ./.github/workflows/_matrix.yml
    with:
      disable_shared: true
      select_platforms: "macosx, linux, win-mingw, win-msvc"
