name: dav1d
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/dav1d.yml'
      - 'patches/dav1d/**'
      - 'modules/dav1d.py'
      - 'build_v2.py'
  pull_request:
    branches:
      - main
    paths:
      - '.github/matrix*.json'
      - '.github/workflows/_matrix.yml'
      - '.github/workflows/dav1d.yml'
      - 'patches/dav1d/**'
      - 'modules/dav1d.py'
      - 'build_v2.py'

jobs:
  build:
    # if: ${{ false }}
    secrets: inherit
    uses: ./.github/workflows/_matrix.yml
    with:
      select_platforms: "macosx, linux, win-mingw, android, iphoneos"
      enable_static_commit: true
